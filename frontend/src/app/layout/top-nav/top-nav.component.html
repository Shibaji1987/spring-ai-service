<header class="flex h-16 items-center justify-between border-b border-slate-800 bg-slate-950 px-6">

  <!-- Left -->
  <div>

    <h2 class="text-lg font-medium text-slate-100">
      Security Operations Dashboard
    </h2>

    <p class="mt-1 text-xs text-slate-400">
      Real-time AI audit monitoring and policy intelligence
    </p>

  </div>

  <!-- Right -->
  <div class="flex items-center gap-4">

    <!-- Search -->
    <div class="hidden md:flex items-center rounded-xl border border-slate-800 bg-slate-900 px-4 py-2">

      <input
        type="text"
        placeholder="Search events..."
        class="bg-transparent text-sm text-slate-200 outline-none placeholder:text-slate-500"
      />

    </div>

    <!-- Status -->
    <div class="rounded-full border border-emerald-500/20 bg-emerald-500/10 px-4 py-2 text-xs font-medium text-emerald-300">

      AI Engine Active

    </div>

    <!-- User -->
    <div class="flex items-center gap-3 rounded-xl border border-slate-800 bg-slate-900 px-3 py-2">

      <div class="h-8 w-8 rounded-full bg-cyan-500/20"></div>

      <div class="hidden md:block">

        <div class="text-sm text-slate-200">
          SOC Analyst
        </div>

        <div class="text-xs text-slate-500">
          Enterprise Security
        </div>

      </div>

    </div>

  </div>

</header>
