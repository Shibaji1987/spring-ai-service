<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-white">Audit Events</h1>
      <p class="mt-2 text-sm text-slate-400">
        Explore, filter, and investigate AI-analyzed audit events.
      </p>
    </div>

    <a
      routerLink="/submit-event"
      class="rounded-xl bg-cyan-500 px-5 py-3 text-sm font-medium text-slate-950">
      Submit Event
    </a>
  </div>

  <div class="rounded-2xl border border-slate-800 bg-slate-900 p-5">
    <ag-grid-angular
      style="
    width: 100%;
    height: 620px;
    --ag-background-color: #0f172a;
    --ag-foreground-color: #e2e8f0;
    --ag-header-background-color: #111827;
    --ag-header-foreground-color: #cbd5e1;
    --ag-border-color: #1e293b;
    --ag-row-border-color: #1e293b;
    --ag-row-hover-color: rgba(34, 211, 238, 0.08);
    --ag-selected-row-background-color: rgba(34, 211, 238, 0.12);
  "
      class="ag-theme-quartz-dark"
      [rowData]="rowData"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [pagination]="true"
      [paginationPageSize]="10"
      (rowClicked)="openAnalysis($event)">
    </ag-grid-angular>
  </div>
</div>
