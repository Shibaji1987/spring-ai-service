spring.application.name=agentic-ai

# ===============================
# OPENAI CONFIGURATION
# ===============================

# Use environment variable for security
spring.ai.openai.api-key=

# Model to use
spring.ai.openai.chat.options.model=gpt-4o-mini

# Optional settings
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=500


# ===============================
# SERVER CONFIG
# ===============================

server.port=8080


# ===============================
# LOGGING
# ===============================

logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web=INFO

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

spring.data.mongodb.uri=
spring.data.mongodb.database=auditdb

# ===============================
# SECURITY CONFIGURATION
# ===============================

app.security.user.username=${APP_SECURITY_USERNAME:analyst}
app.security.user.password=${APP_SECURITY_PASSWORD:Analyst@12345}
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:change-this-development-secret-to-a-strong-256-bit-production-secret}
